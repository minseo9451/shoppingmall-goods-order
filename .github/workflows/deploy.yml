name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "mkdir -p /home/ubuntu/app/target"
          scp -i ~/.ssh/id_rsa target/*.jar ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/target/
          scp -i ~/.ssh/id_rsa Dockerfile ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/
          scp -i ~/.ssh/id_rsa nginx/goodsorder.conf ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Nginx 설치 (최초 1회)
            if ! command -v nginx &> /dev/null; then
              sudo apt update && sudo apt install nginx -y
            fi

            # Nginx 설정 (certbot이 수정한 설정 보호 - 인증서 없을 때만 덮어씀)
            if [ ! -f /etc/letsencrypt/live/goodsorder.kro.kr/fullchain.pem ]; then
              sudo cp /home/ubuntu/app/goodsorder.conf /etc/nginx/sites-available/goodsorder
              sudo ln -sf /etc/nginx/sites-available/goodsorder /etc/nginx/sites-enabled/goodsorder
              sudo nginx -t && sudo systemctl reload nginx
            fi

            # SSL 인증서 발급 (최초 1회)
            if [ ! -f /etc/letsencrypt/live/goodsorder.kro.kr/fullchain.pem ]; then
              sudo apt install certbot python3-certbot-nginx -y
              sudo certbot --nginx -d goodsorder.kro.kr --non-interactive --agree-tos -m minseo9451@gmail.com
            fi

            cd /home/ubuntu/app
            cat > docker-compose.yml << EOF
            version: '3'
            services:
              db:
                image: mysql:8.0
                environment:
                  MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
                  MYSQL_DATABASE: shoppingmall_db
                  MYSQL_USER: ${{ secrets.DB_USERNAME }}
                  MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
                ports:
                  - "3306:3306"
                volumes:
                  - mysql_data:/var/lib/mysql
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${{ secrets.DB_ROOT_PASSWORD }}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
              app:
                image: app
                ports:
                  - "8080:8080"
                environment:
                  SPRING_DATASOURCE_URL: ${{ secrets.DB_URL_DOCKER }}
                  SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
                  SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  SPRING_JPA_HIBERNATE_DDL_AUTO: update
                  SPRING_JPA_SHOW_SQL: "true"
                depends_on:
                  db:
                    condition: service_healthy
            volumes:
              mysql_data:
            EOF
            docker compose down || true
            docker rmi app || true
            docker build -t app .
            docker compose up -d
