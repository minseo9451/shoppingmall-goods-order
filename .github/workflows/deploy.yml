name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "mkdir -p /home/ubuntu/app/target"
          scp -i ~/.ssh/id_rsa target/*.jar ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/target/
          scp -i ~/.ssh/id_rsa Dockerfile ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/app
            cat > docker-compose.yml << EOF
            version: '3'
            services:
              db:
                image: mysql:8.0
                environment:
                  MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
                  MYSQL_DATABASE: shoppingmall_db
                  MYSQL_USER: ${{ secrets.DB_USERNAME }}
                  MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
                ports:
                  - "3306:3306"
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${{ secrets.DB_ROOT_PASSWORD }}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
              app:
                image: app
                ports:
                  - "8080:8080"
                environment:
                  SPRING_DATASOURCE_URL: ${{ secrets.DB_URL_DOCKER }}
                  SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
                  SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  SPRING_JPA_HIBERNATE_DDL_AUTO: update
                  SPRING_JPA_SHOW_SQL: "true"
                depends_on:
                  db:
                    condition: service_healthy
            EOF
            docker compose down || true
            docker rmi app || true
            docker build -t app .
            docker compose up -d
